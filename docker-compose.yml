version: '3.8'

services:
  # ═════════════════════════════════════════════════════════════════════════
  # API ComfyUI
  # ═════════════════════════════════════════════════════════════════════════

  api:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: api-comfyui

    ports:
      - "3000:3000"

    environment:
      # Server
      NODE_ENV: development
      API_PORT: 3000
      API_HOST: 0.0.0.0

      # ComfyUI (ajuste o host conforme seu setup)
      # No Windows com Docker Desktop: usar host.docker.internal
      # No Linux: usar IP da máquina ou 'comfyui' se em mesmo network
      COMFYUI_HOST: host.docker.internal
      COMFYUI_PORT: 8188
      COMFYUI_TIMEOUT: 300000

      # Storage
      STORAGE_PATH: ./storage
      UPLOAD_MAX_SIZE: 10485760
      CLEANUP_INTERVAL: 86400000

      # Logging
      LOG_LEVEL: debug

      # Rate Limiting
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX_REQUESTS: 10

      # Cloudflare Tunnel (opcional)
      CLOUDFLARE_TUNNEL_URL: ""

    volumes:
      # Storage persistente
      - ./storage:/app/storage

      # Migrations
      - ./migrations:/app/migrations:ro

    # Health check
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => { if (r.statusCode !== 200) throw new Error(r.statusCode); })"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

    # Restart policy
    restart: unless-stopped

    # Resource limits (opcional)
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M

    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    networks:
      - api-network

  # ═════════════════════════════════════════════════════════════════════════
  # Redis (Fila distribuída - BullMQ)
  # Necessário para ETAPA 10 (Job Queue)
  # ═════════════════════════════════════════════════════════════════════════

  redis:
    image: redis:7-alpine

    container_name: api-comfyui-redis

    ports:
      - "6379:6379"

    command:
      - redis-server
      - "--appendonly"
      - "yes"  # Persistência (RDB + AOF)
      - "--appendfsync"
      - "everysec"

    volumes:
      - redis-data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

    restart: unless-stopped

    networks:
      - api-network

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ═════════════════════════════════════════════════════════════════════════
  # MinIO (Storage Centralizado - ETAPA A3)
  # S3-compatible object storage
  # Para trocar para S3 real depois: apenas mudar credenciais
  # ═════════════════════════════════════════════════════════════════════════

  minio:
    image: minio/minio:latest

    container_name: api-comfyui-minio

    ports:
      # API S3
      - "9000:9000"
      # Console Web (opcional, para debug)
      - "9001:9001"

    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin

    command: server /data --console-address ":9001"

    volumes:
      - minio-data:/data

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

    restart: unless-stopped

    networks:
      - api-network

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ═════════════════════════════════════════════════════════════════════════
  # ComfyUI (opcional - se rodar em Docker também)
  # Descomente se quiser rodar ComfyUI em Container
  # ═════════════════════════════════════════════════════════════════════════

  # comfyui:
  #   image: comfyui:latest
  #
  #   container_name: comfyui
  #
  #   ports:
  #     - "8188:8188"
  #
  #   environment:
  #     # ComfyUI config
  #     CUDA_VISIBLE_DEVICES: "0"  # GPU ID (if available)
  #
  #   volumes:
  #     - ./comfyui_data:/root/.comfyui
  #     - ./models:/root/.comfyui/models
  #
  #   restart: unless-stopped
  #
  #   networks:
  #     - api-network

networks:
  api-network:
    driver: bridge

volumes:
  storage:
    driver: local

  redis-data:
    driver: local

  minio-data:
    driver: local
